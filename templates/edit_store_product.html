{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0 rounded-3 mt-3">
            <div class="card-header bg-transparent border-bottom-0 pt-4 pb-2 px-4">
                <h4 class="mb-0 text-dark fw-bold">Оновлення вітрини</h4>
                <p class="text-muted small mb-0 font-monospace">UPC: {{ store_product.UPC }}</p>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row align-items-center mb-4 pb-2">
                        <div class="col-md-4 mb-3 mb-md-0">
                            <label class="form-label text-muted small fw-bold text-uppercase" style="letter-spacing: 0.5px;">Ціна продажу (₴)</label>
                            <div class="input-group">
                                <input type="number" step="0.01" min="0" name="selling_price" class="form-control form-control-lg text-success fw-bold fs-5" value="{{ store_product.selling_price }}" required>
                                <span class="input-group-text">₴</span>
                            </div>
                        </div>
                        
                        <div class="col-md-4 mb-3 mb-md-0">
                            <label class="form-label text-muted small fw-bold text-uppercase" style="letter-spacing: 0.5px;">Кількість (шт)</label>
                            <input type="number" min="0" name="products_number" class="form-control form-control-lg fs-5" value="{{ store_product.products_number }}" required>
                        </div>
                        
                        <div class="col-md-4 d-flex justify-content-md-center pt-md-4 mt-1">
                            <div class="form-check form-switch fs-5">
                                <input class="form-check-input shadow-sm" type="checkbox" role="switch" name="promotional_product" id="promoSwitch" {% if store_product.promotional_product %}checked{% endif %}>
                                <label class="form-check-label ms-2 fs-6 mt-1 text-dark" for="promoSwitch">Акційний товар</label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between border-top pt-4">
                        <a href="{{ url_for('store_products') }}" class="btn btn-outline-secondary px-4 rounded-2">Скасувати</a>
                        <button type="submit" class="btn btn-primary px-4 rounded-2">Зберегти зміни</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
