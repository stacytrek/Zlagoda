{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">Додати нового працівника</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>ID Працівника</label>
                            <input type="text" name="id_employee" class="form-control" required maxlength="10">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Посада</label>
                            <select name="empl_role" class="form-select" required>
                                <option value="Касир">Касир</option>
                                <option value="Менеджер">Менеджер</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label>Прізвище</label>
                            <input type="text" name="empl_surname" class="form-control" required maxlength="50">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label>Ім'я</label>
                            <input type="text" name="empl_name" class="form-control" required maxlength="50">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label>По батькові</label>
                            <input type="text" name="empl_patronymic" class="form-control" maxlength="50">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label>Дата народження</label>
                            <input type="date" name="date_of_birth" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label>Дата початку роботи</label>
                            <input type="date" name="date_of_start" class="form-control" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label>Зарплата (грн)</label>
                            <input type="number" step="0.01" min="0" name="salary" class="form-control" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label>Телефон</label>
                            <input type="text" name="phone_number" class="form-control" required maxlength="13" placeholder="+380...">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label>Місто</label>
                            <input type="text" name="city" class="form-control" required maxlength="50">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label>Вулиця</label>
                            <input type="text" name="street" class="form-control" required maxlength="50">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Індекс</label>
                            <input type="text" name="zip_code" class="form-control" required maxlength="9">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Пароль для входу</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between mt-3">
                        <a href="{{ url_for('employees') }}" class="btn btn-secondary">Скасувати</a>
                        <button type="submit" class="btn btn-success">Зберегти працівника</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
