{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="text-center mb-4">Вхід у систему</h3>
                <form method="POST" action="">
                    <div class="mb-3">
                        <label>ID Працівника</label>
                        <input type="text" name="id_employee" class="form-control" required placeholder="Наприклад: M001">
                    </div>
                    <div class="mb-3">
                        <label>Пароль</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Увійти</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
