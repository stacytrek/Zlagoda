{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-light">
                <h4 class="mb-0">Редагування клієнта: {{ customer['card_number'] }}</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">Прізвище</label>
                            <input type="text" name="cust_surname" class="form-control" value="{{ customer['cust_surname'] }}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Ім'я</label>
                            <input type="text" name="cust_name" class="form-control" value="{{ customer['cust_name'] }}" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">По батькові</label>
                            <input type="text" name="cust_patronymic" class="form-control" value="{{ customer['cust_patronymic'] }}">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">Відсоток знижки (%)</label>
                            <input type="number" name="percent" class="form-control" value="{{ customer['percent'] }}" min="0" required>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label">Телефон</label>
                            <input type="text" name="phone_number" class="form-control" value="{{ customer['phone_number'] }}" maxlength="13" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">Місто</label>
                            <input type="text" name="city" class="form-control" value="{{ customer['city'] }}">
                        </div>
                        <div class="col-md-5">
                            <label class="form-label">Вулиця</label>
                            <input type="text" name="street" class="form-control" value="{{ customer['street'] }}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Індекс</label>
                            <input type="text" name="zip_code" class="form-control" value="{{ customer['zip_code'] }}">
                        </div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('customers') }}" class="btn btn-outline-secondary">Скасувати</a>
                        <button type="submit" class="btn btn-primary">Зберегти зміни</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
