{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">Додати новий товар</h4>
            </div>
            <div class="card-body">
                <form method="POST">

                    <div class="mb-3">
                        <label>Категорія товару</label>
                        <select name="category_number" class="form-select" required>
                            <option value="" disabled selected>Оберіть категорію...</option>
                            {% for cat in categories %}
                                <option value="{{ cat['category_number'] }}">{{ cat['category_name'] }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label>Назва товару</label>
                        <input type="text" name="product_name" class="form-control" required maxlength="50" placeholder="Наприклад: Кефір 2.5%">
                    </div>

                    <div class="mb-3">
                        <label>Характеристики</label>
                        <textarea name="characteristics" class="form-control" required maxlength="100" rows="3" placeholder="Опис товару..."></textarea>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('products') }}" class="btn btn-secondary">Скасувати</a>
                        <button type="submit" class="btn btn-success">Зберегти товар</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
