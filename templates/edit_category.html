{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 rounded-3 mt-3">
            <div class="card-header bg-transparent border-bottom-0 pt-4 pb-2 px-4">
                <h4 class="mb-0 text-dark fw-bold">Редагування категорії</h4>
                <p class="text-muted small mb-0">ID: {{ category.category_number }}</p>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label text-muted small fw-bold text-uppercase" style="letter-spacing: 0.5px;">Назва категорії</label>
                        <input type="text" name="category_name" class="form-control form-control-lg fs-6" value="{{ category.category_name }}" required>
                    </div>
                    
                    <div class="d-flex justify-content-between pt-2">
                        <a href="{{ url_for('categories') }}" class="btn btn-outline-secondary px-4 rounded-2">Скасувати</a>
                        <button type="submit" class="btn btn-primary px-4 rounded-2">Зберегти зміни</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
