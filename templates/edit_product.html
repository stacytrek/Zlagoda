{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0 rounded-3 mt-3">
            <div class="card-header bg-transparent border-bottom-0 pt-4 pb-2 px-4">
                <h4 class="mb-0 text-dark fw-bold">Редагування товару</h4>
                <p class="text-muted small mb-0">ID товару: {{ product.id_product }}</p>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row mb-3">
                        <div class="col-md-6 mb-3 mb-md-0">
                            <label class="form-label text-muted small fw-bold text-uppercase" style="letter-spacing: 0.5px;">Назва товару</label>
                            <input type="text" name="product_name" class="form-control" value="{{ product.product_name }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted small fw-bold text-uppercase" style="letter-spacing: 0.5px;">Категорія</label>
                            <select name="category_number" class="form-select" required>
                                {% for cat in categories %}
                                <option value="{{ cat.category_number }}" {% if cat.category_number == product.category_number %}selected{% endif %}>
                                    {{ cat.category_name }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label text-muted small fw-bold text-uppercase" style="letter-spacing: 0.5px;">Характеристики</label>
                        <textarea name="characteristics" class="form-control" rows="3" required>{{ product.characteristics }}</textarea>
                    </div>
                    
                    <div class="d-flex justify-content-between border-top pt-4">
                        <a href="{{ url_for('products') }}" class="btn btn-outline-secondary px-4 rounded-2">Скасувати</a>
                        <button type="submit" class="btn btn-primary px-4 rounded-2">Зберегти зміни</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
